const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

function showToast(msg,type='success'){
  const r=$('#toast-root');
  const c={success:'border-primary/50 bg-primary/10 text-primary',error:'border-accent/50 bg-accent/10 text-accent',info:'border-info/50 bg-info/10 text-info'};
  const ic={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};
  const el=document.createElement('div');
  el.className=`toast-enter flex items-center gap-2.5 px-4 py-3 rounded-xl border backdrop-blur-md text-sm ${c[type]}`;
  el.innerHTML=`<i class="fas ${ic[type]}"></i><span>${msg}</span>`;
  r.appendChild(el);
  setTimeout(()=>{el.classList.remove('toast-enter');el.classList.add('toast-exit');setTimeout(()=>el.remove(),300)},2800);
}

function showModal(html){
  const r=$('#modal-root');
  r.innerHTML=`<div class="modal-backdrop fixed inset-0 flex items-center justify-center z-50" onclick="if(event.target===this)closeModal()"><div class="fade-in bg-surface border border-border rounded-2xl shadow-2xl max-w-5xl w-full mx-4 max-h-[92vh] overflow-hidden">${html}</div></div>`;
  r.classList.remove('hidden');
}
function closeModal(){
  if(state.playerState&&state.playerState.interval){clearInterval(state.playerState.interval)}
  state.playerState=null;
  $('#modal-root').classList.add('hidden');
  $('#modal-root').innerHTML='';
}

function fmtDur(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}

// ===== 成片预览 =====
function genSubSegs(text,totalSec){
  const segCount=Math.min(Math.ceil(text.length/4),5);
  const segs=[];const segLen=Math.ceil(text.length/segCount);
  for(let i=0;i<segCount;i++){
    const s=Math.round((i/segCount)*totalSec*10)/10;
    const e=Math.round(((i+1)/segCount)*totalSec*10)/10;
    segs.push({text:text.slice(i*segLen,(i+1)*segLen),start:s,end:e});
  }
  return segs;
}

function genOutputVideos(task){
  const theme=task.theme||'奶茶';
  const count=task.config.count;
  const durSec=parseInt(task.config.duration);
  const copies=AD_COPY[theme]||AD_COPY['奶茶'];
  const tm=MATERIALS.filter(m=>m.keyword===theme);
  const videos=[];
  for(let i=0;i<count;i++){
    const shuffled=[...tm].sort(()=>Math.random()-.5);
    const cover=shuffled.slice(0,Math.min(3,shuffled.length));
    videos.push({
      index:i+1,
      filename:`${theme}_广告_${String(i+1).padStart(2,'0')}_${task.config.ratio.replace(':','x')}_${task.config.resolution}.mp4`,
      duration:durSec,
      size:(durSec*0.6+Math.random()*2).toFixed(1),
      copyText:copies[i%copies.length],
      coverThumbs:cover.map(m=>m.thumb),
      subtitleSegments:genSubSegs(copies[i%copies.length],durSec),
    });
  }
  return videos;
}

          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`);
}

function togglePlay(){
  const ps=state.playerState;if(!ps)return;
  ps.isPlaying?pausePlayer():playPlayer();
}
function playPlayer(){
  const ps=state.playerState;if(!ps)return;
  ps.isPlaying=true;
  if(ps.currentTime>=ps.duration)ps.currentTime=0;
  const bb=$('#vp-big-play');const bi=$('#vp-big-icon');const pi=$('#vp-play-icon');
  if(bb)bb.classList.add('hidden');
  if(bi)bi.className='fas fa-play text-2xl ml-1';
  if(pi)pi.className='fas fa-pause text-sm';
  if(ps.interval)clearInterval(ps.interval);
  ps.interval=setInterval(()=>{
    ps.currentTime+=0.1;
    if(ps.currentTime>=ps.duration){
      ps.currentTime=ps.duration;pausePlayer();
      if(ps.currentVideo<ps.videos.length-1){setTimeout(()=>{switchVideo(ps.currentVideo+1);playPlayer()},700)}
      return;
    }
    updatePlayerUI();
  },100);
}
function pausePlayer(){
  const ps=state.playerState;if(!ps)return;
  ps.isPlaying=false;
  if(ps.interval){clearInterval(ps.interval);ps.interval=null}
  const bb=$('#vp-big-play');const pi=$('#vp-play-icon');
  if(bb)bb.classList.remove('hidden');
  if(pi)pi.className='fas fa-play text-sm';
}
function seekPlayer(e){
  const ps=state.playerState;if(!ps)return;
  const bar=$('#vp-progress');const r=bar.getBoundingClientRect();
  ps.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*ps.duration;
  updatePlayerUI();
}
function switchVideo(idx){
  const ps=state.playerState;if(!ps||idx<0||idx>=ps.videos.length)return;
  const was=ps.isPlaying;if(was)pausePlayer();
  ps.currentVideo=idx;ps.currentTime=0;ps.duration=ps.videos[idx].duration;
  const v=ps.videos[idx];
  const cv=$('#vp-cover');
  if(cv)cv.innerHTML=`<div class="w-full h-full grid grid-cols-${Math.min(3,v.coverThumbs.length)} gap-px">${v.coverThumbs.map(t=>`<img src="${t}" class="w-full h-full object-cover"/>`).join('')}</div><div class="absolute inset-0 bg-black/30"></div>`;
  const fn=$('#vp-filename');if(fn)fn.textContent=v.filename;
  const st=$('#vp-subtitle-text');if(st){st.textContent='';st.style.opacity='0'}
  const pf=$('#vp-progress-fill');if(pf)pf.style.width='0%';
  updateTimeDisp();
  document.querySelectorAll('.output-thumb').forEach((el,i)=>el.classList.toggle('active-thumb',i===idx));
  // 确保当前项可见
  const activeEl=document.querySelector(`.output-thumb[data-vi="${idx}"]`);
  if(activeEl)activeEl.scrollIntoView({block:'nearest',behavior:'smooth'});
  if(was)playPlayer();
}
function switchPrev(){const ps=state.playerState;if(!ps)return;switchVideo(ps.currentVideo>0?ps.currentVideo-1:ps.videos.length-1)}
function switchNext(){const ps=state.playerState;if(!ps)return;switchVideo(ps.currentVideo<ps.videos.length-1?ps.currentVideo+1:0)}
function updatePlayerUI(){
  const ps=state.playerState;if(!ps)return;
  const v=ps.videos[ps.currentVideo];
  const pf=$('#vp-progress-fill');if(pf)pf.style.width=(ps.currentTime/ps.duration*100)+'%';
  updateTimeDisp();
  const st=$('#vp-subtitle-text');
  if(st&&ps.subtitleConfig.enabled){
    const seg=v.subtitleSegments.find(s=>ps.currentTime>=s.start&&ps.currentTime<s.end);
    if(seg){st.textContent=seg.text;st.style.opacity='1'}else{st.style.opacity='0'}
    st.style.transition='opacity .15s';
  }
}
function updateTimeDisp(){
  const ps=state.playerState;if(!ps)return;
  const el=$('#vp-time');if(el)el.textContent=`${fmtDur(Math.floor(ps.currentTime))} / ${fmtDur(ps.duration)}`;
}

// ===== 交互逻辑 =====
function navigateTo(page){
  state.currentPage=page;state.matSelected.clear();
  $$('#sidebar-nav .sidebar-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===page);
    el.dataset.page===page?el.classList.remove('text-txt-dim'):el.classList.add('text-txt-dim');
  });
  renderPage();
}
function renderPage(){
  const app=$('#app');
  const bgBlobs=app.querySelector('.float-blob')?'':'';
  // 保留背景装饰
  const bgHTML=`<div class="float-blob absolute top-20 right-40 w-80 h-80 rounded-full bg-primary/[.03] blur-3xl"></div><div class="float-blob absolute bottom-20 left-20 w-60 h-60 rounded-full bg-primary/[.02] blur-3xl" style="animation-delay:-4s"></div>`;
  let content='';
  switch(state.currentPage){
    case'dashboard':content=renderDashboard();break;
    case'materials':content=renderMaterials();break;
    case'workflow':content=renderWorkflow();break;
    case'tasks':content=renderTasks();break;
    case'collect':content=renderCollect();break;
  }
  app.innerHTML=bgHTML+content;
  updateTaskBadge();
}
function updateTaskBadge(){
  const a=state.tasks.filter(t=>t.status==='processing'||t.status==='queue').length;
  const b=$('#task-badge');if(a>0){b.style.display='';b.textContent=a}else{b.style.display='none'}
}
function toggleSourceFilter(s){const i=state.matSourceFilter.indexOf(s);if(i===-1)state.matSourceFilter.push(s);else state.matSourceFilter.splice(i,1);renderPage()}
function toggleMatSelect(id){if(state.matSelected.has(id))state.matSelected.delete(id);else state.matSelected.add(id);renderPage()}
function addSelectedToWorkflow(){if(!state.matSelected.size)return;state.wfSelectedMats=MATERIALS.filter(m=>state.matSelected.has(m.id));const kw={};state.wfSelectedMats.forEach(m=>{kw[m.keyword]=(kw[m.keyword]||0)+1});const top=Object.entries(kw).sort((a,b)=>b[1]-a[1])[0]?.[0];if(top&&THEMES.find(t=>t.name===top))state.wfTheme=top;state.wfStep=2;state.matSelected.clear();navigateTo('workflow');showToast(`已添加 ${state.wfSelectedMats.length} 条素材到工作流`)}
function previewMaterial(id){
  const m=MATERIALS.find(x=>x.id===id);
  showModal(`<div class="relative"><button class="absolute top-3 right-3 z-10 w-8 h-8 rounded-full bg-black/50 text-white flex items-center justify-center hover:bg-black/70" onclick="closeModal()"><i class="fas fa-times text-sm"></i></button><div class="aspect-video bg-bg rounded-t-2xl overflow-hidden relative"><img src="${m.thumb}" class="w-full h-full object-cover"/><div class="absolute inset-0 bg-black/30 flex items-center justify-center"><div class="w-16 h-16 rounded-full bg-primary/30 backdrop-blur-sm flex items-center justify-center"><i class="fas fa-play text-white text-2xl ml-1"></i></div></div><div class="absolute bottom-0 left-0 right-0 h-1 bg-black/30"><div class="h-full bg-primary rounded-full" style="width:35%"></div></div></div><div class="p-5 space-y-3"><h3 class="text-lg font-semibold text-txt">${m.title}</h3><div class="grid grid-cols-4 gap-3"><div class="bg-surface rounded-lg p-2.5 text-center"><div class="text-xs text-txt-muted">时长</div><div class="text-sm text-txt font-medium mt-0.5">${fmtDur(m.duration)}</div></div><div class="bg-surface rounded-lg p-2.5 text-center"><div class="text-xs text-txt-muted">分辨率</div><div class="text-sm text-txt font-medium mt-0.5">${m.resolution}</div></div><div class="bg-surface rounded-lg p-2.5 text-center"><div class="text-xs text-txt-muted">大小</div><div class="text-sm text-txt font-medium mt-0.5">${m.size}MB</div></div><div class="bg-surface rounded-lg p-2.5 text-center"><div class="text-xs text-txt-muted">来源</div><div class="text-sm font-medium mt-0.5" style="color:${SOURCE_COLOR[m.source]}">${m.source}</div></div></div><div class="flex gap-1.5">${m.tags.map(t=>`<span class="text-xs px-2 py-1 rounded-md bg-surface text-txt-dim">${t}</span>`).join('')}</div><div class="flex gap-2 pt-2"><button class="btn-primary flex-1 py-2 rounded-lg text-sm" onclick="showToast('已开始下载','info');closeModal()"><i class="fas fa-download mr-1.5"></i>下载素材</button><button class="btn-outline flex-1 py-2 rounded-lg text-sm" onclick="closeModal();state.wfSelectedMats=[MATERIALS.find(x=>x.id===${m.id})];state.wfTheme='${m.keyword}';state.wfStep=2;navigateTo('workflow')"><i class="fas fa-plus mr-1.5"></i>加入工作流</button></div></div></div>`);
}
function selectTheme(name){state.wfTheme=name;state.wfSelectedMats=[];renderPage()}
function addCustomTheme(){const input=$('#custom-theme-input');const name=input?.value?.trim();if(!name)return;if(THEMES.find(t=>t.name===name)){showToast('该主题已存在','error');return}THEMES.push({name,icon:'fa-tag',color:'#908090',keywords:[name]});AD_COPY[name]=[`${name}太棒了`,`推荐${name}`,`这个${name}绝了`,`一定要试试${name}`,`${name}值得拥有`];state.wfTheme=name;state.wfSelectedMats=[];input.value='';showToast(`已添加主题：${name}`);renderPage()}
function toggleWFMat(id){const i=state.wfSelectedMats.findIndex(m=>m.id===id);if(i===-1)state.wfSelectedMats.push(MATERIALS.find(m=>m.id===id));else state.wfSelectedMats.splice(i,1);renderPage()}
function moveWFMat(i,d){const j=i+d;if(j<0||j>=state.wfSelectedMats.length)return;[state.wfSelectedMats[i],state.wfSelectedMats[j]]=[state.wfSelectedMats[j],state.wfSelectedMats[i]];renderPage()}
function removeWFMat(i){state.wfSelectedMats.splice(i,1);renderPage()}
function goWFStep(step){if(step===2&&!state.wfTheme){showToast('请先选择主题','error');return}if(step===3&&state.wfSelectedMats.length<3){showToast('请至少选择3条素材','error');return}state.wfStep=step;renderPage()}
function submitTask(){
  const c=state.wfConfig;
  const task={id:'task_'+Date.now(),name:`${state.wfTheme}_混剪_${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}).replace(':','')}`,theme:state.wfTheme,matCount:state.wfSelectedMats.length,config:{count:c.output.count,duration:c.output.duration,ratio:c.output.ratio,resolution:c.output.resolution},subtitleConfig:{enabled:c.subtitle.enabled,position:c.subtitle.position,color:c.subtitle.color,stroke:c.subtitle.stroke,font:c.subtitle.font},status:'queue',progress:0,logText:'排队等待处理...',time:new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})};
  state.tasks.unshift(task);showToast(`任务已提交：${c.output.count}条 × ${c.output.duration} 广告视频`);
  setTimeout(()=>{task.status='processing';task.logText='正在分析素材...';renderPage()},2000);
  setTimeout(()=>{task.progress=15;task.logText='正在生成配音...';renderPage()},4000);
  setTimeout(()=>{task.progress=35;task.logText='正在混剪视频片段...';renderPage()},7000);
  setTimeout(()=>{task.progress=55;task.logText='正在压制字幕...';renderPage()},10000);
  setTimeout(()=>{task.progress=75;task.logText='正在混入配乐...';renderPage()},13000);
  setTimeout(()=>{task.progress=90;task.logText='正在编码输出...';renderPage()},15000);
  setTimeout(()=>{task.progress=100;task.status='done';task.logText='全部完成';showToast(`任务完成：${task.name}，共${c.output.count}条视频`);renderPage()},18000);
  state.wfStep=1;state.wfTheme=null;state.wfSelectedMats=[];navigateTo('tasks');
}
function retryTask(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;t.status='queue';t.progress=0;t.logText='重新排队...';showToast('任务已重新提交','info');renderPage();setTimeout(()=>{t.status='processing';t.logText='正在处理...';renderPage()},2000);setTimeout(()=>{t.progress=50;t.logText='正在混剪...';renderPage()},5000);setTimeout(()=>{t.progress=100;t.status='done';t.logText='全部完成';showToast('任务重试成功');renderPage()},9000)}
function deleteTask(id){state.tasks=state.tasks.filter(t=>t.id!==id);showToast('任务已删除','info');renderPage()}
function toggleCollectPlatform(p){const i=state.collectPlatforms.indexOf(p);if(i===-1)state.collectPlatforms.push(p);else state.collectPlatforms.splice(i,1);renderPage()}
let collectInterval=null;
function startCollect(){if(!state.collectKeywords.trim()){showToast('请输入搜索关键词','error');return}state.collecting=true;state.collectProgress=0;renderPage();collectInterval=setInterval(()=>{state.collectProgress+=Math.random()*8+2;if(state.collectProgress>=100){state.collectProgress=100;state.collecting=false;clearInterval(collectInterval);const kc=state.collectKeywords.split(',').filter(k=>k.trim()).length;showToast(`采集完成！预计新增约 ${kc*state.collectCount*state.collectPlatforms.length} 条素材`)}renderPage()},600)}
function stopCollect(){state.collecting=false;clearInterval(collectInterval);showToast('采集已停止','info');renderPage()}

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded',()=>{
  $$('#sidebar-nav .sidebar-item').forEach(el=>el.addEventListener('click',()=>navigateTo(el.dataset.page)));
  state.tasks.push(
    {id:'task_demo1',name:'奶茶_混剪_1430',theme:'奶茶',matCount:5,config:{count:5,duration:'15s',ratio:'9:16',resolution:'1080p'},subtitleConfig:{enabled:true,position:'底部居中',color:'白色',stroke:true,font:'思源黑体'},status:'done',progress:100,logText:'全部完成',time:'01-15 14:30'},
    {id:'task_demo2',name:'火锅_混剪_1120',theme:'火锅',matCount:4,config:{count:10,duration:'10s',ratio:'9:16',resolution:'1080p'},subtitleConfig:{enabled:true,position:'底部居中',color:'黄色',stroke:true,font:'思源黑体'},status:'done',progress:100,logText:'全部完成',time:'01-15 11:20'},
    {id:'task_demo3',name:'护肤_混剪_1830',theme:'护肤',matCount:3,config:{count:3,duration:'20s',ratio:'16:9',resolution:'720p'},subtitleConfig:{enabled:false,position:'底部居中',color:'白色',stroke:false,font:'思源黑体'},status:'failed',progress:45,logText:'TTS服务超时',time:'01-14 18:30'},
  );
  renderPage();
});
</script>
